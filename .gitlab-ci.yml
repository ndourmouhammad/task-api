stages:
  - test
  - build
  - docker

variables:
  MAVEN_CLI_OPTS: "--batch-mode -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MYSQL_DATABASE: "db_tasks"
  TASK_CORE_REPO: "https://github.com/ndourmouhammad/task-core.git"
  TASK_CORE_REF: "main"

.maven_job: &maven_job
  image: maven:3.9.9-eclipse-temurin-17
  cache:
    key: "$CI_PROJECT_NAME-maven"
    paths:
      - .m2/repository
  before_script:
    - chmod +x mvnw
    - mkdir -p "$CI_PROJECT_DIR/.m2/repository"
    - apt-get update && apt-get install -y --no-install-recommends git
    - rm -rf "$CI_PROJECT_DIR/.task-core"
    - git clone --depth 1 --branch "$TASK_CORE_REF" "$TASK_CORE_REPO" "$CI_PROJECT_DIR/.task-core"
    - chmod +x "$CI_PROJECT_DIR/.task-core/mvnw"
    - cd "$CI_PROJECT_DIR/.task-core" && ./mvnw $MAVEN_CLI_OPTS -DskipTests install && cd "$CI_PROJECT_DIR"

test:
  <<: *maven_job
  stage: test
  services:
    - name: mysql:8.0
      alias: mysql
  variables:
    SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/db_tasks?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false"
    SPRING_DATASOURCE_USERNAME: "root"
    SPRING_DATASOURCE_PASSWORD: "$DB_PASSWORD"
  script:
    - |
      bash -lc 'for i in $(seq 1 30); do
        if (echo > /dev/tcp/mysql/3306) >/dev/null 2>&1; then
          exit 0
        fi
        echo "Waiting for MySQL..."
        sleep 2
      done
      echo "MySQL did not start in time" >&2
      exit 1'
    - ./mvnw $MAVEN_CLI_OPTS test

build:
  <<: *maven_job
  stage: build
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    paths:
      - target/task-api-0.0.1-SNAPSHOT.jar
    expire_in: 1 day

docker:
  stage: docker
  image: docker:27.5.1
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: "overlay2"
  services:
    - name: docker:27.5.1-dind
      alias: docker
  needs:
    - job: build
      artifacts: true
  script:
    - test -n "$DOCKER_USERNAME"
    - test -n "$DOCKER_PASSWORD"
    - test -n "$DOCKER_IMAGE"
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - docker build -t "$DOCKER_IMAGE:latest" .
    - docker push "$DOCKER_IMAGE:latest"
